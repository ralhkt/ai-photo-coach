name: ai_photo_coach
description: 攝影師 — on-device AI photography coach for iOS and Android.
publish_to: "none"
version: 0.1.5+24

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  camera: ^0.12.0
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  image: ^4.5.4
  sensors_plus: ^7.0.0
  google_mlkit_face_detection: ^0.13.0
  google_mlkit_pose_detection: ^0.14.0
  google_mlkit_image_labeling: ^0.14.0
  shared_preferences: ^2.5.3
  battery_plus: ^6.2.1
  http: ^1.2.2
  exif: ^3.3.0
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/reference_samples/